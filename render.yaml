services:
  - type: web
    name: gfm-backend
    env: node
    region: sao-paulo
    plan: free
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: npx prisma migrate deploy && node dist/src/main.js
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: DATABASE_URL
        fromDatabase:
          name: gfm-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 8h

  - type: web
    name: gfm-frontend
    env: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_URL
        value: https://gfm-backend.onrender.com

databases:
  - name: gfm-db
    region: sao-paulo
    plan: free
    databaseName: gfm
    ipAllowList: []
